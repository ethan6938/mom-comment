<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leave a Birthday Message</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #fff1f2, #ffffff, #fffbeb);
      color: #292524;
      line-height: 1.6;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .container {
      width: min(92%, 680px);
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 32px;
      padding: 28px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.07);
      border: 1px solid #f5f5f4;
    }

    h1 {
      font-size: 34px;
      margin-bottom: 12px;
      color: #1c1917;
      text-align: center;
      line-height: 1.2;
    }

    .intro {
      text-align: center;
      font-size: 17px;
      color: #57534e;
      margin-bottom: 24px;
    }

    .birthday-form {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
    }

    .form-row {
      margin-bottom: 16px;
    }

    input,
    textarea {
      width: 100%;
      display: block;
      padding: 14px 16px;
      border: 1px solid #e7e5e4;
      border-radius: 18px;
      font-size: 16px;
      font-family: Arial, sans-serif;
      color: #292524;
      background: #fffdfd;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus,
    textarea:focus {
      border-color: #f43f5e;
      box-shadow: 0 0 0 4px rgba(244, 63, 94, 0.12);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 6px;
    }

    .btn {
      padding: 12px 20px;
      border-radius: 18px;
      font-weight: bold;
      display: inline-block;
      transition: 0.2s ease;
      border: none;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
    }

    .btn-primary {
      background: #f43f5e;
      color: white;
      box-shadow: 0 12px 24px rgba(244, 63, 94, 0.25);
    }

    .btn-secondary {
      background: white;
      color: #292524;
      border: 1px solid #e7e5e4;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
    }

    .saved-note {
      display: none;
      margin-top: 18px;
      text-align: center;
      color: #15803d;
      font-weight: bold;
      font-size: 15px;
    }

    .saved-note.show {
      display: block;
    }

    @media (max-width: 700px) {
      body {
        padding: 18px 12px;
      }

      .card {
        padding: 22px 16px;
      }

      h1 {
        font-size: 28px;
      }

      .intro {
        font-size: 15px;
      }

      .birthday-form {
        max-width: 100%;
      }

      .buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>Leave a Birthday Message for Mom</h1>
      <p class="intro">
        Write a special memory, a kind message, or a birthday wish.
        Your message will appear on the main birthday page.
      </p>

      <form class="birthday-form" id="birthdayForm">
        <div class="form-row">
          <input type="text" id="commentName" placeholder="Your name" required>
        </div>

        <div class="form-row">
          <textarea id="commentMessage" placeholder="Write your birthday message here..." required></textarea>
        </div>

        <div class="buttons">
          <button type="submit" class="btn btn-primary">Save Message</button>

        </div>

        <div class="saved-note" id="savedNote">
          Message saved successfully. You can now go back to the main page.
        </div>
      </form>
    </div>
  </div>

 <script>
  const STORAGE_KEY = "momBirthdayComments";
  const commentsGrid = document.getElementById("commentsGrid");
  const cardClasses = ["rose", "amber", "sky"];

  const editModal = document.getElementById("editModal");
  const editName = document.getElementById("editName");
  const editMessage = document.getElementById("editMessage");
  const saveEditBtn = document.getElementById("saveEditBtn");
  const cancelEditBtn = document.getElementById("cancelEditBtn");

  let currentEditIndex = null;

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text || "";
    return div.innerHTML;
  }

  function getComments() {
    try {
      const savedComments = localStorage.getItem(STORAGE_KEY);
      return savedComments ? JSON.parse(savedComments) : [];
    } catch (error) {
      console.error("Could not read comments from storage:", error);
      return [];
    }
  }

  function saveComments(comments) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(comments));
      return true;
    } catch (error) {
      console.error("Could not save comments to storage:", error);
      return false;
    }
  }

  function openEditModal(index) {
    const comments = getComments();
    const comment = comments[index];
    if (!comment || !editModal || !editName || !editMessage) return;

    currentEditIndex = index;
    editName.value = comment.name || "";
    editMessage.value = comment.message || "";
    editModal.classList.add("active");
  }

  function closeEditModal() {
    if (!editModal) return;
    editModal.classList.remove("active");
    currentEditIndex = null;
  }

  function deleteComment(index) {
    const comments = getComments();
    comments.splice(index, 1);
    saveComments(comments);
    renderCommentsOnMainPage();
  }

  function renderCommentsOnMainPage() {
    if (!commentsGrid) return;

    const comments = getComments();

    if (!Array.isArray(comments) || comments.length === 0) {
      commentsGrid.innerHTML = `
        <div class="empty-comments">
          No birthday messages yet.
        </div>
      `;
      return;
    }

    const newestFirst = comments
      .map((comment, originalIndex) => ({ comment, originalIndex }))
      .reverse();

    commentsGrid.innerHTML = newestFirst.map((item, index) => {
      const colorClass = cardClasses[index % cardClasses.length];
      return `
        <div class="wish-card comment-card ${colorClass}">
          <div class="icon">💌</div>
          <div class="comment-name">${escapeHtml(item.comment?.name)}</div>
          <div class="comment-text">${escapeHtml(item.comment?.message)}</div>
          <div class="comment-date">${escapeHtml(item.comment?.date)}</div>
          <div class="comment-actions">
            <button class="comment-btn edit-btn" onclick="openEditModal(${item.originalIndex})">Edit</button>
            <button class="comment-btn delete-btn" onclick="deleteComment(${item.originalIndex})">Delete</button>
          </div>
        </div>
      `;
    }).join("");
  }

  if (saveEditBtn) {
    saveEditBtn.addEventListener("click", function() {
      if (currentEditIndex === null || !editName || !editMessage) return;

      const updatedName = editName.value.trim();
      const updatedMessage = editMessage.value.trim();

      if (!updatedName || !updatedMessage) return;

      const comments = getComments();
      if (!comments[currentEditIndex]) return;

      comments[currentEditIndex].name = updatedName;
      comments[currentEditIndex].message = updatedMessage;
      comments[currentEditIndex].date = "Edited: " + new Date().toLocaleString();

      saveComments(comments);
      renderCommentsOnMainPage();
      closeEditModal();
    });
  }

  if (cancelEditBtn) {
    cancelEditBtn.addEventListener("click", closeEditModal);
  }

  if (editModal) {
    editModal.addEventListener("click", function(e) {
      if (e.target === editModal) {
        closeEditModal();
      }
    });
  }

  renderCommentsOnMainPage();

  window.openEditModal = openEditModal;
  window.deleteComment = deleteComment;
</script>
