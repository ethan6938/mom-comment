<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leave a Birthday Message</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #fff1f2, #ffffff, #fffbeb);
      color: #292524;
      line-height: 1.6;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 850px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 32px;
      padding: 40px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.07);
      border: 1px solid #f5f5f4;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 12px;
      color: #1c1917;
      text-align: center;
    }

    .intro {
      text-align: center;
      font-size: 18px;
      color: #57534e;
      margin-bottom: 30px;
    }

    .birthday-form {
      max-width: 700px;
      margin: 0 auto;
    }

    .form-row {
      margin-bottom: 20px;
    }

    input,
    textarea {
      width: 100%;
      padding: 16px 18px;
      border: 1px solid #e7e5e4;
      border-radius: 18px;
      font-size: 16px;
      font-family: Arial, sans-serif;
      color: #292524;
      background: #fffdfd;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus,
    textarea:focus {
      border-color: #f43f5e;
      box-shadow: 0 0 0 4px rgba(244, 63, 94, 0.12);
    }

    textarea {
      resize: vertical;
      min-height: 160px;
    }

    .buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 10px;
    }

    .btn {
      padding: 14px 24px;
      border-radius: 18px;
      font-weight: bold;
      display: inline-block;
      transition: 0.2s ease;
      border: none;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-primary {
      background: #f43f5e;
      color: white;
      box-shadow: 0 12px 24px rgba(244, 63, 94, 0.25);
    }

    .btn-secondary {
      background: white;
      color: #292524;
      border: 1px solid #e7e5e4;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
    }

    .saved-note {
      display: none;
      margin-top: 20px;
      text-align: center;
      color: #15803d;
      font-weight: bold;
    }

    .saved-note.show {
      display: block;
    }

    @media (max-width: 700px) {
      .card {
        padding: 28px 20px;
      }

      h1 {
        font-size: 32px;
      }

      .intro {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Leave a Birthday Message for Mom</h1>
      <p class="intro">
        Write a special memory, a kind message, or a birthday wish.  
        Your message will appear on the main birthday page.
      </p>

      <form class="birthday-form" id="birthdayForm">
        <div class="form-row">
          <input type="text" id="commentName" placeholder="Your name" required>
        </div>

        <div class="form-row">
          <textarea id="commentMessage" placeholder="Write your birthday message here..." required></textarea>
        </div>

        <div class="buttons">
          <button type="submit" class="btn btn-primary">Save Message</button>
          <a href="index.html" class="btn btn-secondary">Back to Main Page</a>
        </div>

        <div class="saved-note" id="savedNote">
          Message saved successfully. You can now go back to the main page.
        </div>
      </form>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "momBirthdayComments";
    const form = document.getElementById("birthdayForm");
    const nameInput = document.getElementById("commentName");
    const messageInput = document.getElementById("commentMessage");
    const savedNote = document.getElementById("savedNote");

    function getComments() {
      const savedComments = localStorage.getItem(STORAGE_KEY);
      return savedComments ? JSON.parse(savedComments) : [];
    }

    function saveComments(comments) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(comments));
    }

    form.addEventListener("submit", function(event) {
      event.preventDefault();

      const name = nameInput.value.trim();
      const message = messageInput.value.trim();

      if (!name || !message) return;

      const comments = getComments();

      comments.push({
        name: name,
        message: message,
        date: new Date().toLocaleString()
      });

      saveComments(comments);
      form.reset();
      savedNote.classList.add("show");
    });
  </script>
</body>
</html>
